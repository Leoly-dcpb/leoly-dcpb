<!DOCTYPE html>
<html>
<head>
  <title>Eclipse - Fase 5</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: monospace;
      margin: 0;
      text-align: center;
    }

    .center {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 60px;
      letter-spacing: 8px;
      margin-bottom: 40px;
    }

    .erro {
      font-size: 20px;
      margin-bottom: 30px;
    }

    input {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 10px;
      font-family: monospace;
      text-align: center;
      width: 300px;
    }

    button {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 12px 20px;
      cursor: pointer;
      font-family: monospace;
      margin-top: 10px;
    }

    button:hover {
      background-color: #222;
    }
  </style>
</head>

<body>

<div class="center">

  <h1>ECLIPSE</h1>

  <div class="erro">
    ERRO AO CARREGAR DADOS
  </div>

  <!-- BOTÃO DOWNLOAD -->
  <a href="arquivo.txt" download="dados_corrompidos.txt">
    <button>[ baixar arquivo ]</button>
  </a>

  <br><br>

  <!-- BARRA DE RESPOSTA -->
  <input type="text" id="resposta" placeholder="Digite a resposta">
  <br>
  <button onclick="verificar()">ENVIAR</button>

</div>

<script>
function verificar() {
  let r = document.getElementById("resposta").value.toLowerCase().trim();

  if (r === "nada é oque parece" || r === "nada e oque parece") {
    window.location.href = "fase6.html";
  } else {
    alert("Resposta incorreta.");
  }
}
</script>

</body>
</html>
