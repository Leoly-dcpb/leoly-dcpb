  <style>

<body>

<div class="center">

  <h1>Errare humanum est</h1>

  <input type="text" id="resposta" placeholder="Digite a resposta">
  <br><br>
  <button onclick="verificar()">ENVIAR</button>

<button onclick="window.open('lost.html', '_blank')">

  </div>

</div>

<script>
function normalizar(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "");
}

function verificar() {
  let r = document.getElementById("resposta").value;
  let resposta = normalizar(r);

  if (resposta === "homemvitruviano") {
    window.location.href = "fase6.html";
  } else {
    alert("Resposta incorreta.");
  }
}
</script>
