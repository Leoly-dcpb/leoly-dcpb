<!DOCTYPE html>
<html>
<head>
  <title>Eclipse - Fase 3</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: monospace;
      margin: 0;
    }

    /* CENTRO REAL DA TELA */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    /* LATERAL DIREITA FIXA */
    .right {
      position: absolute;
      right: 0;
      top: 0;
      width: 300px;
      padding: 20px;
      color: #bbbbbb;
      font-size: 14px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 8px;
      margin-bottom: 30px;
    }

    input {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 10px;
      font-family: monospace;
      text-align: center;
      width: 300px;
    }

    button {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #222;
    }

    .coord {
      margin-top: 20px;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .hint {
      margin-top: 15px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 3px;
    }
  </style>
</head>

<body>

<!-- CENTRO -->
<div class="center">

  <h1>ECLIPSE</h1>

  <input type="text" id="resposta" placeholder="Digite a resposta">
  <br><br>

  <div class="coord">
    40°41'20.4"N 74°02'42.0"W
  </div>

  <div class="hint">
    O ARQUITETO
  </div>

  <br>
  <button onclick="verificar()">ENVIAR</button>

</div>

<!-- DIREITA -->
<div class="right">
  <p>Coordenadas:</p>
  <p>- Representam um ponto na Terra</p>
  <p>- Podem ser inseridas no Google Maps</p>
  <p>- Latitude (N/S) e Longitude (E/W)</p>
  <p>- Use isso para descobrir locais específicos</p>
</div>

<script>
function verificar() {
  let r = document.getElementById("resposta").value.toLowerCase().trim();

  if (r === "frédéric auguste bartholdi" || r === "bartholdi") {
    window.location.href = "fase4.html";
  } else {
    alert("Resposta incorreta.");
  }
}
</script>

</body>
</html>
