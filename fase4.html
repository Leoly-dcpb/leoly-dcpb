<!DOCTYPE html>
<html>
<head>
  <title>Eclipse - Fase 4</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: monospace;
      margin: 0;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 8px;
      margin-bottom: 30px;
    }

    input {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 10px;
      font-family: monospace;
      text-align: center;
      width: 300px;
    }

    button {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #222;
    }
  </style>
</head>

<body>

<div class="center">

  <h1>ECLIPSE</h1>

  <input type="text" id="resposta" placeholder="Digite a resposta">
  <br><br>
  <button onclick="verificar()">ENVIAR</button>

</div>

<!-- ÁUDIO MORSE -->
<audio id="morse" autoplay loop>
  <source src="morse.wav" type="audio/mpeg">
</audio>

<script>
function verificar() {
  let r = document.getElementById("resposta").value.toLowerCase().trim();

  if (r === "transmission interrupted") {
    window.location.href = "fase5.html";
  } else {
    alert("Resposta incorreta.");
  }
}
</script>

</body>
</html>
